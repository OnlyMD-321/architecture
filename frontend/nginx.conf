# Configuration Nginx — Proxy inverse pour l'API backend
# Sert les fichiers statiques React et redirige /api vers le backend

server {
    listen 80;
    server_name localhost;

    # Répertoire racine contenant les fichiers React compilés
    root /usr/share/nginx/html;
    index index.html;

    # Proxy inverse : toutes les requêtes /api sont redirigées vers le backend
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Gestion du routage côté client (SPA React)
    # Redirige toutes les routes inconnues vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mise en cache des ressources statiques (optimisation performance)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
