name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # JOB 1 — Tests Backend (unit + intégration, SQLite en mémoire)
  # ============================================================
  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests unitaires
        run: npm run test:unitaire
        env:
          NODE_ENV: test
          JWT_SECRET: grm_secret_ci_2026

      - name: Exécution des tests d'intégration
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: grm_secret_ci_2026

  # ============================================================
  # JOB 2 — Build Frontend (vérifie que le build React réussit)
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm install --legacy-peer-deps

      - name: Build de production
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: /api

  # ============================================================
  # JOB 3 — Docker Build (vérifie que les images se construisent)
  #          Déclenché uniquement sur push vers main
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: grm-backend:ci

      - name: Build image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: grm-frontend:ci
          build-args: |
            REACT_APP_API_URL=/api
